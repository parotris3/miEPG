name: miEPG

on:
  schedule:
    - cron: '5 */6 * * *'    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_canales:  # Trabajo para crear y subir canales.txt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script (create canales.txt)
        run: python .github/workflows/generacanales.py

      - name: Commit and push canales.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git add canales.txt
          git commit -m "Update canales.txt (automated)" --allow-empty
          git push
          
        shell: bash

  create_epg:  # Trabajo para crear y subir miEPG.xml
    runs-on: ubuntu-latest
    needs: create_canales  # Depende de que canales.txt se haya creado
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Importante: traemos los últimos cambios del repo (incluyendo el canales.txt recién creado y el miEPG.xml antiguo)
      - name: Pull latest changes
        run: |
          git pull origin main 
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Ejecutamos el nuevo script de Python
      - name: Execute Python script (create miEPG.xml)
        run: python .github/workflows/EPG_script.py

      - name: Commit and push miEPG.xml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add miEPG.xml
          git commit -m "Update miEPG.xml (automated)" --allow-empty
          git push
        shell: bash
