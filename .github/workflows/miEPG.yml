name: miEPG

on:
  schedule:
    - cron: '5 */6 * * *'    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_epg:  # Trabajo para crear y subir miEPG.xml
    runs-on: ubuntu-latest
    needs: create_canales  # Importante: Este trabajo depende del anterior
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Actualizado a v4

      # Actualizamos con la rama main para asegurar que tenemos el canales.txt y el miEPG.xml más reciente
      - name: Pull latest changes
        run: |
          git pull origin main 
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Execute Python script (create miEPG.xml)
        run: python .github/workflows/EPG_script.py

      - name: Commit and push miEPG.xml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add miEPG.xml
          git commit -m "Update miEPG.xml (automated)" --allow-empty
          git push
        shell: bash
  create_epg:  # Trabajo para crear y subir miEPG.xml
    runs-on: ubuntu-latest
    needs: create_canales  # Importante: Este trabajo depende del anterior
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Dar permisos de ejecución al script (Bash)  # Ya no necesitas Python aquí
        run: chmod +x .github/workflows/EPG_script.sh

      - name: Execute Bash script (create miEPG.xml)
        run: ./.github/workflows/EPG_script.sh
        shell: bash

      - name: Commit and push miEPG.xml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add miEPG.xml # Solo agrega el archivo .gz
          git commit -m "Update miEPG.xml(automated)" --allow-empty
          git push
                 
        shell: bash
